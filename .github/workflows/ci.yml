name: CI
on:
  pull_request:
    branches:
      - v*
      - develop/*

jobs:
  generate:
    runs-on: ubuntu-latest
    name: "Check generated files are up to date"
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Go stable version
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: "go.mod"
          check-latest: true
      - name: Regenerate code
        run: go generate ./...
      - name: Verify no changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated files are out of date. Run 'go generate ./...' and commit the result."
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    name: "Test"
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Cache testdata
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        env:
          TEST_SUITE_COMMIT: "48461fc3568972801b40eaccc428a31bce338f6e"
        with:
          path: tests
          key: ${{ runner.os }}-testdata-${{ env.TEST_SUITE_COMMIT }}
          restore-keys: |
            ${{ runner.os }}-testdata-
      - name: Setup testdata
        env:
          TEST_SUITE_COMMIT: "48461fc3568972801b40eaccc428a31bce338f6e"
        run: |
          ./init-test-suite.sh $TEST_SUITE_COMMIT
      - name: Cache Go modules
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/.cache/bazel
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Install Go stable version
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: "go.mod"
          check-latest: true
      - name: Test
        run: go test ./...
